# =============================================================================
# Azure DevOps Pipeline – TuColmadoRD Monorepo
# Stage 1 (UnitTests): corre en dev, qa y main – usa el Dockerfile raíz para
#   ejecutar las pruebas de .NET, Auth (Jest) y Frontend (Vitest).
# Stage 2 (BuildImages): solo en main – construye las imágenes Docker finales.
# =============================================================================

name: $(Build.SourceBranchName)-$(Build.BuildId)

trigger:
  branches:
    include:
      - dev
      - qa
      - main

pr:
  branches:
    include:
      - qa
      - main

resources:
  - repo: self

variables:
  imageTag: '$(Build.SourceBranchName)-$(Build.BuildId)'

stages:

  # ─── Stage 1: Pruebas unitarias (todas las ramas) ──────────────────────────
  - stage: UnitTests
    displayName: Unit Tests (.NET + Auth + Frontend)
    jobs:
      - job: RunTests
        displayName: Build CI image & run all tests
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: Docker@2
            displayName: Build CI test image (target ci)
            inputs:
              command: build
              dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
              buildContext: '$(Build.SourcesDirectory)'
              tags: 'ci-$(imageTag)'
              arguments: '--target ci'

  # ─── Stage 2: Build imágenes de producción (solo main) ─────────────────────
  - stage: BuildImages
    displayName: Build Production Docker Images
    dependsOn: UnitTests
    condition: >
      and(
        succeeded(),
        eq(variables['Build.SourceBranchName'], 'main')
      )
    jobs:
      - job: BuildServiceImages
        displayName: Build all service images
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: Docker@2
            displayName: Build API image
            inputs:
              command: build
              dockerfile: '$(Build.SourcesDirectory)/backend/Dockerfile.api'
              buildContext: '$(Build.SourcesDirectory)/backend'
              tags: 'api-$(imageTag)'

          - task: Docker@2
            displayName: Build API Gateway image
            inputs:
              command: build
              dockerfile: '$(Build.SourcesDirectory)/backend/Dockerfile.gateway'
              buildContext: '$(Build.SourcesDirectory)/backend'
              tags: 'gateway-$(imageTag)'

          - task: Docker@2
            displayName: Build Auth image
            inputs:
              command: build
              dockerfile: '$(Build.SourcesDirectory)/auth/Dockerfile'
              buildContext: '$(Build.SourcesDirectory)/auth'
              tags: 'auth-$(imageTag)'
