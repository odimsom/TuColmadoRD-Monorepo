server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  types {
    text/html                 html htm;
    text/css                  css;
    application/javascript    js;
    application/json          json;
    image/svg+xml             svg;
    image/x-icon              ico;
    image/png                 png;
    image/jpeg                jpg jpeg;
    image/gif                 gif;
    image/webp                webp;
    font/woff2                woff2;
    application/xml           xml;
    text/plain                txt;
  }
  default_type application/octet-stream;

  location = /sitemap.xml {
    add_header Content-Type application/xml;
    expires 24h;
    add_header Cache-Control "public, max-age=86400";
  }

  location = /robots.txt {
    add_header Content-Type text/plain;
    expires 24h;
    add_header Cache-Control "public, max-age=86400";
  }

  location ~* \.(js|css|svg|png|jpg|jpeg|gif|webp|woff2|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
