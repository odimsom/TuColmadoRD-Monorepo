server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # index.html nunca se cachea: el browser debe leerlo en cada deploy
  # para obtener los nuevos nombres de bundles con hash
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header Pragma "no-cache";
    try_files $uri =404;
  }

  # Assets con hash en el nombre: cache permanente (immutable)
  location ~* \.(js|css|woff2|woff|ttf|png|jpg|jpeg|svg|ico|webp|gif)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location = /sitemap.xml {
    add_header Content-Type application/xml;
    try_files /sitemap.xml =404;
  }

  # SPA routing
  location / {
    try_files $uri $uri/ /index.html;
  }
}