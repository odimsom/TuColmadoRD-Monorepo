global:
  scrape_interval: 10s

scrape_configs:
  - job_name: catalog-service
    static_configs:
      - targets: ["catalog-service:8080"]
    metrics_path: /metrics

  - job_name: reports-service
    static_configs:
      - targets: ["reports-service:8081"]
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
