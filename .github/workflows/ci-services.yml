name: CI — Rust Microservices & Gateway

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build+push images even without service changes'
        required: false
        default: 'true'
  push:
    branches: [dev, qa, main]
    paths:
      - "services/catalog-service/**"
      - "services/reports-service/**"
      - "backend/src/Presentations/TuColmadoRD.ApiGateway/**"
      - "infrastructure/swarm/**"
      - ".github/workflows/ci-services.yml"
  pull_request:
    branches: [dev, qa, main]
    paths:
      - "services/catalog-service/**"
      - "services/reports-service/**"
      - "backend/src/Presentations/TuColmadoRD.ApiGateway/**"
      - "infrastructure/swarm/**"

env:
  REGISTRY: ghcr.io
  IMAGE_ORG: odimsom

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Detect which services changed to avoid rebuilding both on every push
  # ─────────────────────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      catalog: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.catalog }}
      reports: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.reports }}
      swarm:   ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.swarm }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            catalog:
              - 'services/catalog-service/**'
            reports:
              - 'services/reports-service/**'
            swarm:
              - 'infrastructure/swarm/**'

  # ─────────────────────────────────────────────────────────────────────────────
  # Lint + test (runs on every affected service)
  # ─────────────────────────────────────────────────────────────────────────────
  test-catalog:
    needs: changes
    if: needs.changes.outputs.catalog == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/catalog-service
    steps:
      - uses: actions/checkout@v6

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/catalog-service/target
          key: catalog-${{ runner.os }}-${{ hashFiles('services/catalog-service/Cargo.lock') }}
          restore-keys: catalog-${{ runner.os }}-

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Format check
        run: cargo fmt --check

      - name: Build (release)
        run: cargo build --release

  test-reports:
    needs: changes
    if: needs.changes.outputs.reports == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/reports-service
    steps:
      - uses: actions/checkout@v6

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/reports-service/target
          key: reports-${{ runner.os }}-${{ hashFiles('services/reports-service/Cargo.lock') }}
          restore-keys: reports-${{ runner.os }}-

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Format check
        run: cargo fmt --check

      - name: Build (release)
        run: cargo build --release

  # ─────────────────────────────────────────────────────────────────────────────
  # Build & push Docker images (only on main or qa)
  # ─────────────────────────────────────────────────────────────────────────────
  build-catalog:
    needs: [changes, test-catalog]
    if: |
      needs.changes.outputs.catalog == 'true' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/qa')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_ORG }}/catalog-service
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push catalog-service
        uses: docker/build-push-action@v7
        with:
          context: services/catalog-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_ORG }}/catalog-service:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_ORG }}/catalog-service:buildcache,mode=max

  build-reports:
    needs: [changes, test-reports]
    if: |
      needs.changes.outputs.reports == 'true' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/qa')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_ORG }}/reports-service
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push reports-service
        uses: docker/build-push-action@v7
        with:
          context: services/reports-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_ORG }}/reports-service:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_ORG }}/reports-service:buildcache,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy to VPS via SSH (only on main)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-swarm:
    needs: [build-catalog, build-reports]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (needs.build-catalog.result == 'success' || needs.build-catalog.result == 'skipped') &&
      (needs.build-reports.result == 'success' || needs.build-reports.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 2222
          script: |
            cd /opt/tucolmadord
            set -a; source .env; set +a
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            REGISTRY=ghcr.io/odimsom TAG=${{ github.sha }} \
            docker stack deploy -c docker-compose.swarm.yml tucolmadord \
              --with-registry-auth --prune
            echo "Stack deployed: SHA ${{ github.sha }}"
            docker service ls --filter label=com.docker.stack.namespace=tucolmadord
