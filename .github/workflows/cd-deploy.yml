name: CD - Deploy to Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Sync code to /app/tucolmadord
        run: |
          rsync -a --delete \
            --exclude='.env' \
            --exclude='letsencrypt/' \
            --exclude='*.log' \
            --exclude='.git/' \
            ./ /app/tucolmadord/

      - name: Deploy with Docker Compose
        working-directory: /app/tucolmadord
        env:
          SUDO_PASSWORD: ${{ secrets.VPS_SUDO_PASSWORD }}
        run: |
          chmod +x deploy-production.sh
          # Use sudo -S to read password from stdin
          echo "$SUDO_PASSWORD" | sudo -S bash deploy-production.sh

      - name: Prune old Docker images
        run: docker image prune -f

      - name: Deployment summary
        run: |
          echo "### Deployed to Production" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- By: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://${{ vars.PUBLIC_WEB_DOMAIN }}" >> $GITHUB_STEP_SUMMARY

  build-installer:
    name: Build & Release Desktop App
    runs-on: windows-latest

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Inno Setup
        run: choco install innosetup -y
        shell: pwsh

      - name: Install web-admin dependencies
        working-directory: ./frontend/web-admin
        run: npm ci

      - name: Resolve production version
        id: vars
        run: |
          $package = Get-Content ./frontend/package.json | ConvertFrom-Json
          $version = $package.version
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "app_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        shell: pwsh

      - name: Build desktop + installer
        run: |
          $env:RELEASE_TYPE = "production"
          $env:APP_VERSION = "${{ steps.vars.outputs.app_version }}"
          $env:TU_COLMADORD_ROOT = "${{ github.workspace }}"
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          & "${{ github.workspace }}/frontend/scripts/build-desktop.ps1"
        shell: pwsh

      - name: Verify installer
        run: |
          $installerDir = Join-Path $env:GITHUB_WORKSPACE "backend/publish/installer"
          if (-not (Test-Path $installerDir)) {
            Write-Error "Installer directory not found: $installerDir"
            exit 1
          }

          $exe = Get-ChildItem -Path $installerDir -Filter "*.exe" -File | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No installer .exe found in $installerDir"
            exit 1
          }

          Write-Host "Installer found: $($exe.FullName)"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.vars.outputs.app_version }}
          name: TuColmadoRD v${{ steps.vars.outputs.app_version }} - Production Release
          prerelease: false
          files: |
            backend/publish/installer/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
