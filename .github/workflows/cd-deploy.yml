name: CD - Deploy & Release

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      
      - name: Execute deployment script
        run: |
          sudo bash -c '
            export GIT_TERMINAL_PROMPT=0
            export DEBIAN_FRONTEND=noninteractive
            git config --global --add safe.directory /app/tucolmadord
            cd /app/tucolmadord
            git fetch origin
            git reset --hard origin/main
            bash executions/deploy-production.sh
          '

  release:
    name: Create GitHub Release
    needs: deploy
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.vars.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6
      
      - name: Resolve version
        id: vars
        run: |
          VERSION=$(grep -m1 '"version"' frontend/package.json | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          TAG="v${VERSION}"
          echo "tag_name=${TAG}" >> $GITHUB_OUTPUT
          
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.vars.outputs.tag_name }}"
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          
          git tag -f "$TAG" -m "Release $TAG"
          git push origin "$TAG" --force
          
          gh release create "$TAG" \
            --title "TuColmadoRD $TAG" \
            --notes "### Deploy — Producción
            
            **Versión:** \`${TAG}\`
            **Commit:** [\`${SHORT_SHA}\`](https://github.com/${{ github.repository }}/commit/${GITHUB_SHA})
            **Rama:** main
            
            > Instalador Windows adjuntado automáticamente por GitHub Actions." \
            || gh release edit "$TAG" --title "TuColmadoRD $TAG"

  build-installer:
    name: Build & Attach Installer to Release
    needs: release
    runs-on: windows-latest
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Inno Setup
        run: choco install innosetup -y
        shell: pwsh

      - name: Install web-admin dependencies
        working-directory: ./frontend/web-admin
        run: pnpm install --frozen-lockfile

      - name: Build desktop + installer
        run: |
          $env:RELEASE_TYPE       = "production"
          $env:APP_VERSION        = (Get-Content ./frontend/package.json | ConvertFrom-Json).version
          $env:TU_COLMADORD_ROOT  = "${{ github.workspace }}"
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          & "${{ github.workspace }}/frontend/scripts/build-desktop.ps1"
        shell: pwsh

      - name: Attach installer to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release.outputs.tag_name }}
          prerelease: false
          allow_updates: true
          files: backend/publish/installer/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
