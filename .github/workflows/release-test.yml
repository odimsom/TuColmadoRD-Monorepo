name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Inno Setup
        run: choco install innosetup -y
        shell: pwsh

      - name: Install web-admin dependencies
        working-directory: ./frontend/web-admin
        run: npm ci

      - name: Resolve version from tag
        id: vars
        run: |
          $tag = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "v0.0.1-test.1"
          }
          $version = $tag.TrimStart('v')
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "app_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        shell: pwsh

      - name: Build desktop + installer
        run: |
          $env:RELEASE_TYPE = "test"
          $env:APP_VERSION = "${{ steps.vars.outputs.app_version }}"
          $env:TU_COLMADORD_ROOT = "${{ github.workspace }}"
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          & "${{ github.workspace }}/frontend/scripts/build-desktop.ps1"
        shell: pwsh

      - name: Verify installer
        run: |
          $installerDir = Join-Path $env:GITHUB_WORKSPACE "backend/publish/installer"
          if (-not (Test-Path $installerDir)) {
            Write-Error "Installer directory not found: $installerDir"
            exit 1
          }

          $exe = Get-ChildItem -Path $installerDir -Filter "*.exe" -File | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No installer .exe found in $installerDir"
            exit 1
          }

          Write-Host "Installer found: $($exe.FullName)"
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ steps.vars.outputs.app_version }}
          path: backend/publish/installer/*.exe
          if-no-files-found: error

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TuColmadoRD ${{ github.ref_name }} - Test Release
          prerelease: true
          generate_release_notes: true
          files: |
            backend/publish/installer/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
