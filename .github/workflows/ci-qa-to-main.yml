name: Promote - QA → Main

# Las pruebas unitarias son responsabilidad exclusiva de Azure DevOps.
# Este workflow solo promueve el commit de qa a main cuando hay un push.

on:
  push:
    branches:
      - qa

permissions:
  contents: write

jobs:
  promote-to-main:
    name: Promote qa → main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Push to main
        run: git push origin ${{ github.sha }}:refs/heads/main
