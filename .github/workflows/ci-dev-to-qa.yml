name: CI - Dev to QA

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Test .NET Backend
        working-directory: backend
        run: |
          dotnet restore TuColmadoRD.slnx
          dotnet build TuColmadoRD.slnx -c Release --no-restore
          dotnet test TuColmadoRD.slnx -c Release --no-build --verbosity normal

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Test Auth Service
        working-directory: auth
        run: |
          npm install -g pnpm
          pnpm install --frozen-lockfile
          pnpm test

  promote:
    name: Promote Dev to QA
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create and Merge PR to QA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_EXISTS=$(gh pr list --base qa --head dev --state open --json number --jq length)
          if [ "$PR_EXISTS" -gt "0" ]; then
            PR_NUMBER=$(gh pr list --base qa --head dev --state open --json number --jq '.[0].number')
            gh pr merge $PR_NUMBER --merge --admin || gh pr merge $PR_NUMBER --merge
          else
            PR_URL=$(gh pr create \
              --base qa \
              --head dev \
              --title "[Auto] Promote dev → qa" \
              --body "PR automático: pruebas unitarias pasaron.")
            gh pr merge "$PR_URL" --merge --admin || gh pr merge "$PR_URL" --merge
          fi
