services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tucolmadord-network

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tucolmadord-network

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    restart: on-failure:3
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/tu_colmado_auth?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NET_API_URL: http://api:8080
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "${AUTH_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - tucolmadord-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    restart: on-failure:3
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__PostgresSQLConnectionString: Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      EcfGenerator__BaseUrl: http://ecf-generator:5000
      AuthApi__BaseUrl: http://auth:3000
      Outbox__CloudSyncBaseUrl: http://auth:3000
    depends_on:
      postgres:
        condition: service_healthy
      ecf-generator:
        condition: service_started
    ports:
      - "${CORE_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - tucolmadord-network

  ecf-generator:
    build:
      context: ./generadordexmle-cf
      dockerfile: Dockerfile
    restart: on-failure:3
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - tucolmadord-network

  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.gateway
    restart: on-failure:3
    environment:
      GatewayOptions__AuthApiUrl: http://auth:3000
      GatewayOptions__CoreApiUrl: http://api:8080
      GatewayOptions__JwtSecret: ${JWT_SECRET}
      GatewayOptions__AllowedOrigins__0: http://localhost:4200
      GatewayOptions__AllowedOrigins__1: http://localhost:5173
      GatewayOptions__AllowedOrigins__2: http://localhost:5209
      GatewayOptions__AllowedOrigins__3: https://${PUBLIC_WEB_DOMAIN}
      GatewayOptions__AllowedOrigins__4: https://${PUBLIC_LANDING_DOMAIN}
      GatewayOptions__AllowedOrigins__5: https://www.${PUBLIC_LANDING_DOMAIN}
    depends_on:
      auth:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "${API_PORT:-8081}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/gateway/health/cloud"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.http.routers.tucolmadord-api.rule=Host(`${PUBLIC_API_DOMAIN}`)
      - traefik.http.routers.tucolmadord-api.entrypoints=websecure
      - traefik.http.routers.tucolmadord-api.tls=true
      - traefik.http.routers.tucolmadord-api.tls.certresolver=letsencrypt
      - traefik.http.services.tucolmadord-api.loadbalancer.server.port=8080
    networks:
      - tucolmadord-network

  traefik:
    image: traefik:v2.10.7
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.40
    command:
      - "--log.level=DEBUG"
      - "--api.insecure=true" # Enable dashboard for debugging
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Global HTTP to HTTPS redirection
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # Let's Encrypt - Using TLS Challenge
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8084:8080" # Dashboard port (DEBUG ONLY)
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    networks:
      - tucolmadord-network

  landing:
    build:
      context: ./frontend/landing-page
      dockerfile: Dockerfile
      args:
        VITE_WEB_ADMIN_URL: ${PUBLIC_WEB_URL}
    restart: on-failure:3
    ports:
      - "${LANDING_PORT:-8082}:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.tucolmadord-landing.rule=Host(`${PUBLIC_LANDING_DOMAIN}`) || Host(`www.${PUBLIC_LANDING_DOMAIN}`)
      - traefik.http.routers.tucolmadord-landing.entrypoints=websecure
      - traefik.http.routers.tucolmadord-landing.tls=true
      - traefik.http.routers.tucolmadord-landing.tls.certresolver=letsencrypt
      - traefik.http.services.tucolmadord-landing.loadbalancer.server.port=80
    networks:
      - tucolmadord-network

  web:
    build:
      context: ./frontend/web-admin
      dockerfile: Dockerfile
    restart: on-failure:3
    ports:
      - "${WEB_PORT:-8083}:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.tucolmadord-web.rule=Host(`${PUBLIC_WEB_DOMAIN}`)
      - traefik.http.routers.tucolmadord-web.entrypoints=websecure
      - traefik.http.routers.tucolmadord-web.tls=true
      - traefik.http.routers.tucolmadord-web.tls.certresolver=letsencrypt
      - traefik.http.services.tucolmadord-web.loadbalancer.server.port=80
    networks:
      - tucolmadord-network

networks:
  tucolmadord-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/tucolmadord/postgres_data
  mongo_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/tucolmadord/mongo_data
