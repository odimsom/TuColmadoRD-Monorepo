services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - tucolmadord-network

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    networks:
      - tucolmadord-network

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/tu_colmado_auth?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NET_API_URL: http://api:8080
    depends_on:
      - mongo
    ports:
      - "${AUTH_PORT:-3000}:3000"
    networks:
      - tucolmadord-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__PostgresSQLConnectionString: Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      EcfGenerator__BaseUrl: http://ecf-generator:5000
      AuthApi__BaseUrl: http://auth:3000
      Outbox__CloudSyncBaseUrl: http://auth:3000
    depends_on:
      - postgres
      - ecf-generator
    ports:
      - "${CORE_PORT:-8080}:8080"
    networks:
      - tucolmadord-network

  ecf-generator:
    build:
      context: ./generadordexmle-cf
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    networks:
      - tucolmadord-network

  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.gateway
    restart: unless-stopped
    environment:
      GatewayOptions__AuthApiUrl: http://auth:3000
      GatewayOptions__CoreApiUrl: http://api:8080
      GatewayOptions__JwtSecret: ${JWT_SECRET}
      GatewayOptions__AllowedOrigins__0: http://localhost:4200
      GatewayOptions__AllowedOrigins__1: http://localhost:5173
      GatewayOptions__AllowedOrigins__2: http://localhost:5209
      GatewayOptions__AllowedOrigins__3: https://${PUBLIC_WEB_DOMAIN}
      GatewayOptions__AllowedOrigins__4: https://${PUBLIC_LANDING_DOMAIN}
      GatewayOptions__AllowedOrigins__5: https://www.${PUBLIC_LANDING_DOMAIN}
    depends_on:
      - auth
      - api
    ports:
      - "${API_PORT:-8081}:8080"
    labels:
      - traefik.enable=true
      - traefik.http.routers.tucolmadord-api.rule=Host(`${PUBLIC_API_DOMAIN}`)
      - traefik.http.routers.tucolmadord-api.entrypoints=websecure
      - traefik.http.routers.tucolmadord-api.tls=true
      - traefik.http.services.tucolmadord-api.loadbalancer.server.port=8080
    networks:
      - tucolmadord-network

  landing:
    build:
      context: ./frontend/landing-page
      dockerfile: Dockerfile
      args:
        VITE_WEB_ADMIN_URL: ${PUBLIC_WEB_URL}
    restart: unless-stopped
    ports:
      - "${LANDING_PORT:-8082}:80"
    labels:
      - traefik.enable=true
      - traefik.http.routers.tucolmadord-landing.rule=Host(`${PUBLIC_LANDING_DOMAIN}`) || Host(`www.${PUBLIC_LANDING_DOMAIN}`)
      - traefik.http.routers.tucolmadord-landing.entrypoints=websecure
      - traefik.http.routers.tucolmadord-landing.tls=true
      - traefik.http.services.tucolmadord-landing.loadbalancer.server.port=80
    networks:
      - tucolmadord-network

  web:
    build:
      context: ./frontend/web-admin
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8083}:80"
    labels:
      - traefik.enable=true
      - traefik.http.routers.tucolmadord-web.rule=Host(`${PUBLIC_WEB_DOMAIN}`)
      - traefik.http.routers.tucolmadord-web.entrypoints=websecure
      - traefik.http.routers.tucolmadord-web.tls=true
      - traefik.http.services.tucolmadord-web.loadbalancer.server.port=80
    networks:
      - tucolmadord-network

networks:
  tucolmadord-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
