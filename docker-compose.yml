services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tucolmadord-network

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tucolmadord-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tucolmadord-network

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - tucolmadord-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    restart: on-failure:3
    environment:
      NODE_ENV: production
      PORT: 4000
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-TuColmado RD <noreply@tucolmadord.com>}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM: ${TWILIO_FROM:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SERVICE_SECRET: ${SERVICE_SECRET:-internal-secret}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - tucolmadord-network

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    restart: on-failure:3
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/tu_colmado_auth?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NET_API_URL: http://api:8080
      EMAIL_SERVICE_URL: http://notification-service:4000
      SERVICE_SECRET: ${SERVICE_SECRET:-internal-secret}
    depends_on:
      mongo:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    ports:
      - "${AUTH_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - tucolmadord-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    restart: on-failure:3
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__PostgresSQLConnectionString: Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      EcfGenerator__BaseUrl: http://ecf-generator:5000
      AuthApi__BaseUrl: http://auth:3000
      Outbox__CloudSyncBaseUrl: http://auth:3000
      JwtSettings__Secret: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      ecf-generator:
        condition: service_started
    ports:
      - "${CORE_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - tucolmadord-network

  ecf-generator:
    build:
      context: ./generadordexmle-cf
      dockerfile: Dockerfile
    restart: on-failure:3
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - tucolmadord-network

  catalog-service:
    image: ghcr.io/odimsom/catalog-service:main
    restart: on-failure:3
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      PORT: "8080"
      RUST_LOG: "info"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - tucolmadord-network

  reports-service:
    image: ghcr.io/odimsom/reports-service:main
    restart: on-failure:3
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      PORT: "8081"
      CACHE_TTL_S: "600"
      RUST_LOG: "info"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - tucolmadord-network

  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.gateway
    restart: on-failure:3
    environment:
      GatewayOptions__AuthApiUrl: http://auth:3000
      GatewayOptions__CoreApiUrl: http://api:8080
      GatewayOptions__JwtSecret: ${JWT_SECRET}
      GatewayOptions__AllowedOrigins__0: http://localhost:4200
      GatewayOptions__AllowedOrigins__1: http://localhost:5173
      GatewayOptions__AllowedOrigins__2: http://localhost:5209
      GatewayOptions__AllowedOrigins__3: https://${PUBLIC_WEB_DOMAIN}
      GatewayOptions__AllowedOrigins__4: https://${PUBLIC_LANDING_DOMAIN}
      GatewayOptions__AllowedOrigins__5: https://www.${PUBLIC_LANDING_DOMAIN}
    depends_on:
      auth:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "${API_PORT:-8081}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/gateway/health/cloud"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.http.routers.tucolmadord-api.rule=Host(`${PUBLIC_API_DOMAIN}`)
      - traefik.http.routers.tucolmadord-api.entrypoints=websecure
      - traefik.http.routers.tucolmadord-api.tls=true
      - traefik.http.routers.tucolmadord-api.tls.certresolver=letsencrypt
      - traefik.http.services.tucolmadord-api.loadbalancer.server.port=8080
    networks:
      - tucolmadord-network

  traefik:
    image: traefik:v2.11
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "1.40"
    command:
      - "--log.level=DEBUG"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8084:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    networks:
      - tucolmadord-network

  landing:
    build:
      context: ./frontend/landing-page
      dockerfile: Dockerfile
      args:
        VITE_WEB_ADMIN_URL: ${PUBLIC_WEB_URL}
    restart: on-failure:3
    ports:
      - "${LANDING_PORT:-8082}:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.tucolmadord-landing.rule=Host(`${PUBLIC_LANDING_DOMAIN}`) || Host(`www.${PUBLIC_LANDING_DOMAIN}`)
      - traefik.http.routers.tucolmadord-landing.entrypoints=websecure
      - traefik.http.routers.tucolmadord-landing.priority=1
      
      - traefik.http.routers.tucolmadord-sitemap.rule=(Host(`${PUBLIC_LANDING_DOMAIN}`) || Host(`www.${PUBLIC_LANDING_DOMAIN}`)) && Path(`/sitemap.xml`)
      - traefik.http.routers.tucolmadord-sitemap.entrypoints=websecure
      - traefik.http.routers.tucolmadord-sitemap.priority=10
      
      - traefik.http.routers.tucolmadord-landing.tls=true
      - traefik.http.routers.tucolmadord-landing.tls.certresolver=letsencrypt
      - traefik.http.services.tucolmadord-landing.loadbalancer.server.port=80
    networks:
      - tucolmadord-network

  web:
    build:
      context: ./frontend/web-admin
      dockerfile: Dockerfile
    restart: on-failure:3
    ports:
      - "${WEB_PORT:-8083}:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.tucolmadord-web.rule=Host(`${PUBLIC_WEB_DOMAIN}`)
      - traefik.http.routers.tucolmadord-web.entrypoints=websecure
      - traefik.http.routers.tucolmadord-web.tls=true
      - traefik.http.routers.tucolmadord-web.tls.certresolver=letsencrypt
      - traefik.http.services.tucolmadord-web.loadbalancer.server.port=80
    networks:
      - tucolmadord-network

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.external-url=/prometheus
      - --web.route-prefix=/prometheus
    volumes:
      - prometheus-data:/prometheus
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.devops-prometheus.rule=Host(`${PUBLIC_DEVOPS_DOMAIN:-devops.tucolmadord.com}`) && PathPrefix(`/prometheus`)
      - traefik.http.routers.devops-prometheus.entrypoints=websecure
      - traefik.http.routers.devops-prometheus.tls=true
      - traefik.http.routers.devops-prometheus.tls.certresolver=letsencrypt
      - traefik.http.services.devops-prometheus.loadbalancer.server.port=9090
    networks:
      - tucolmadord-network

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: https://${PUBLIC_DEVOPS_DOMAIN:-devops.tucolmadord.com}/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    labels:
      - traefik.enable=true
      # Main route: /grafana path prefix
      - traefik.http.routers.devops-grafana.rule=Host(`${PUBLIC_DEVOPS_DOMAIN:-devops.tucolmadord.com}`) && PathPrefix(`/grafana`)
      - traefik.http.routers.devops-grafana.entrypoints=websecure
      - traefik.http.routers.devops-grafana.tls=true
      - traefik.http.routers.devops-grafana.tls.certresolver=letsencrypt
      - traefik.http.services.devops-grafana.loadbalancer.server.port=3000
      # Root redirect: devops.tucolmadord.com → /grafana
      - traefik.http.routers.devops-root.rule=Host(`${PUBLIC_DEVOPS_DOMAIN:-devops.tucolmadord.com}`)
      - traefik.http.routers.devops-root.entrypoints=websecure
      - traefik.http.routers.devops-root.tls=true
      - traefik.http.routers.devops-root.tls.certresolver=letsencrypt
      - traefik.http.routers.devops-root.middlewares=devops-redirect
      - traefik.http.routers.devops-root.service=devops-grafana
      - traefik.http.middlewares.devops-redirect.redirectregex.regex=^https://([^/]+)/?$$
      - traefik.http.middlewares.devops-redirect.redirectregex.replacement=https://$${1}/grafana/
      - traefik.http.middlewares.devops-redirect.redirectregex.permanent=true
    depends_on:
      - prometheus
    networks:
      - tucolmadord-network

networks:
  tucolmadord-network:
    driver: bridge

volumes:
  redis_data:
  prometheus-data:
  grafana-data:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/tucolmadord/postgres_data
  mongo_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/tucolmadord/mongo_data
